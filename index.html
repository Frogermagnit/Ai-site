<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1e2530; 
            font-family: 'Overpass Mono', monospace;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Чёрный Хедер */
        header {
            background-color: #0A0C10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            width: 100%;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .brand p {
            margin: 6px 0 0 0;
            font-size: 13px;
            color: #ffffff;
            opacity: 0.9;
        }

        .auth-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #1e2530; /* Заливка цветом основного фона */
            border: 2px solid;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 22px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-signup {
            border-color: #42d3a5;
            color: #42d3a5;
        }

        .btn-signup:hover {
            background-color: #42d3a5;
            color: #1e2530;
        }

        .btn-login {
            border-color: #386280;
            color: #52a3e1;
        }

        .btn-login:hover {
            background-color: #386280;
            color: #ffffff;
        }

        /* Главный контейнер */
        .main-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 30px 40px 30px; /* Отступ сверху вместо удаленного штриха */
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-text {
            text-align: center;
            margin-bottom: 25px;
        }

        .intro-text h2 {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .intro-text p {
            font-size: 16px;
            color: #ffffff;
            margin: 0;
        }

        /* Поле ввода промпта */
        .generator-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 12px;
            margin-bottom: 45px;
            align-items: center;
        }

        .prompt-wrapper {
            flex-grow: 1;
        }

        .prompt-input {
            width: 100%;
            min-height: 42px;
            max-height: 150px;
            background-color: #1e2530;
            border: 2px solid #59687a; 
            border-radius: 12px;
            color: #42d3a5; 
            font-family: inherit;
            font-size: 15px;
            padding: 10px 18px;
            resize: none;
            outline: none;
            overflow-y: auto;
            display: block;
        }

        .btn-generate {
            background-color: #1e2530;
            border: 2px solid #59687a;
            border-radius: 8px;
            color: #52a3e1;
            padding: 0 16px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            height: 42px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-generate:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        /* Сетка колонок редактора */
        .editors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            margin-bottom: 50px;
        }

        .editor-column {
            background-color: #2b3444; 
            border: 1px solid #141921;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #202733;
            padding: 10px 15px;
            border-bottom: 2px solid #141921;
        }

        .editor-title {
            font-size: 14px;
            font-weight: 500;
        }

        .editor-title.html { color: #437199; }
        .editor-title.css { color: #437199; }
        .editor-title.js { color: #764399; }

        .copy-btn {
            background: transparent;
            border: 1px solid #141921;
            border-radius: 4px;
            color: #59687a;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            color: #ffffff;
            border-color: #59687a;
        }

        .editor-body {
            position: relative;
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            height: 400px;
        }

        /* Секция интерактивного превью (Второй макет) */
        .preview-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 400;
            margin: 0 0 15px 0;
            color: #ffffff;
        }

        .browser-mockup {
            width: 100%;
            height: 550px;
            background-color: #2b3444;
            border: 3px solid #52a3e1; /* Яркая синяя рамка вокруг превью */
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .browser-header {
            background-color: #202733;
            padding: 10px 10px;
            border-bottom: 2px solid #141921;
        }

        .browser-url {
            color: #52a3e1;
            font-size: 14px;
            text-decoration: underline;
            user-select: none;
        }

        .browser-body {
            flex-grow: 1;
            position: relative;
            background-color: #2b3444;
        }

        /* Текст No Design наискосок */
        .no-design-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            font-weight: 700;
            color: #ffffff;
            transform: rotate(-25deg); /* Поворот текста */
            user-select: none;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 2px;
        }

        /* Скрытый по умолчанию фрейм для рендеринга */
        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff; /* Белый фон для создаваемого сайта */
            display: none;
            position: relative;
            z-index: 10;
        }

        /* Кастомные скроллбары */
        .editor-body::-webkit-scrollbar,
        .prompt-input::-webkit-scrollbar {
            width: 14px;
        }

        .editor-body::-webkit-scrollbar-track,
        .prompt-input::-webkit-scrollbar-track {
            background: #2b3444;
        }

        .editor-body::-webkit-scrollbar-thumb,
        .prompt-input::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border: 2px solid #2b3444;
        }

        .code-container {
            margin: 0;
            display: flex;
        }

        .line-numbers {
            color: #52a3e1; 
            text-align: right;
            padding-right: 15px;
            user-select: none;
            font-size: 15px;
        }

        .code-content {
            color: #52a3e1;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        /* Чёрный Футер (Без штриха) */
        footer {
            background-color: #000000;
            width: 100%;
            padding: 20px 30px;
            text-align: left; /* Выравнивание влево */
            font-size: 14px;
            color: #437199; /* Синеватый оттенок шрифта версии */
        }

        @media (max-width: 950px) {
            .editors-grid {
                grid-template-columns: 1fr;
            }
            .editor-body {
                height: 300px;
            }
            .no-design-placeholder {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>Ai Assistant</h1>
            <p>Your best choice to get site design</p>
        </div>
        <div class="auth-buttons">
            <a href="#signup" class="btn btn-signup" onclick="alert('Окно регистрации')">Sign up</a>
            <a href="#login" class="btn btn-login" onclick="alert('Окно входа')">Log in</a>
        </div>
    </header>

    <div class="main-container">
        <div class="intro-text">
            <h2>This website allows you to create a template-based website design for your project</h2>
            <p>Write down your idea</p>
        </div>

        <div class="generator-box">
            <div class="prompt-wrapper">
                <textarea class="prompt-input" id="promptInput" placeholder="Ask AI..." rows="1"></textarea>
            </div>
            <button class="btn-generate" id="generateBtn">Generate</button>
        </div>

        <div class="editors-grid">
            <div class="editor-column">
                <div class="editor-header">
                    <span class="editor-title html">HTML</span>
                    <button class="copy-btn" onclick="copyCode('htmlCode')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <div class="editor-body">
                    <div class="code-container">
                        <div class="line-numbers" id="htmlLines">1</div>
                        <div class="code-content" id="htmlCode" contenteditable="true">...</div>
                    </div>
                </div>
            </div>

            <div class="editor-column">
                <div class="editor-header">
                    <span class="editor-title css">CSS</span>
                    <button class="copy-btn" onclick="copyCode('cssCode')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <div class="editor-body">
                    <div class="code-container">
                        <div class="line-numbers" id="cssLines">1</div>
                        <div class="code-content" id="cssCode" contenteditable="true">...</div>
                    </div>
                </div>
            </div>

            <div class="editor-column">
                <div class="editor-header">
                    <span class="editor-title js">JS</span>
                    <button class="copy-btn" onclick="copyCode('jsCode')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <div class="editor-body">
                    <div class="code-container">
                        <div class="line-numbers" id="jsLines">1</div>
                        <div class="code-content" id="jsCode" contenteditable="true">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-section">
            <h2 class="preview-title">Preview design</h2>
            <div class="browser-mockup">
                <div class="browser-header">
                    <span class="browser-url">https://example.com</span>
                </div>
                <div class="browser-body">
                    <div class="no-design-placeholder" id="noDesignText">No Design</div>
                    <iframe class="preview-iframe" id="livePreview"></iframe>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="version-text">Version 0.1</div>
    </footer>

    <script>
        // Динамическое изменение высоты инпута
        const promptInput = document.getElementById('promptInput');
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Функция обновления номеров строк
        function updateLineNumbers(codeId, linesId) {
            const codeContent = document.getElementById(codeId);
            const linesContainer = document.getElementById(linesId);
            const text = codeContent.innerText;
            const linesCount = text.split('\n').length;
            
            let linesHtml = '';
            for (let i = 1; i <= linesCount; i++) {
                linesHtml += i + '<br>';
            }
            linesContainer.innerHTML = linesHtml;
        }

        // Функция сборки кода из колонок и вывода в Live Preview
        function renderLiveCode() {
            const html = document.getElementById('htmlCode').innerText;
            const css = document.getElementById('cssCode').innerText;
            const js = document.getElementById('jsCode').innerText;
            
            const iframe = document.getElementById('livePreview');
            const placeholder = document.getElementById('noDesignText');
            
            // Если в полях пусто или базовые три точки — показываем заглушку No Design
            if ((html === '...' || html.trim() === '') && 
                (css === '...' || css.trim() === '') && 
                (js === '...' || js.trim() === '')) {
                iframe.style.display = 'none';
                placeholder.style.display = 'flex';
                return;
            }
            
            // Иначе прячем текст и включаем отображение сайта внутри фрейма
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
            
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html lang="ru">
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { margin: 15px; font-family: sans-serif; color: #333; }
                        ${css}
                    </style>
                </head>
                <body>
                    ${html}
                    <script>${js}<\/script>
                </body>
                </html>
            `);
            iframeDoc.close();
        }

        // Назначаем слежение за вводом текста (чтобы превью обновлялось на лету при изменении кода)
        ['htmlCode', 'cssCode', 'jsCode'].forEach(id => {
            const el = document.getElementById(id);
            const linesId = id.replace('Code', 'Lines');
            
            el.addEventListener('input', () => {
                updateLineNumbers(id, linesId);
                renderLiveCode();
            });
        });

        // Кнопка ИИ-Генерации
        document.getElementById('generateBtn').addEventListener('click', () => {
            if(!promptInput.value.trim()) return;
            
            // Имитируем заполнение полей сгенерированным кодом
            document.getElementById('htmlCode').innerText = `<div class="welcome-card">\n  <h2>Preview Design</h2>\n  <p>Generated in real time</p>\n  <button id="alertBtn">Check JS</button>\n</div>`;
            document.getElementById('cssCode').innerText = `.welcome-card {\n  background: linear-gradient(135deg, #42d3a5, #386280);\n  padding: 30px;\n  border-radius: 12px;\n  color: #fff;\n  text-align: center;\n  box-shadow: 0 8px 16px rgba(0,0,0,0.1);\n}\nbutton {\n  background: #fff;\n  border: none;\n  padding: 10px 20px;\n  border-radius: 6px;\n  font-weight: bold;\n  cursor: pointer;\n  color: #1e2530;\n}`;
            document.getElementById('jsCode').innerText = `const btn = document.getElementById('alertBtn');\nbtn.addEventListener('click', () => {\n  alert('Button work');\n});`;
            
            // Синхронно пересчитываем строки и запускаем рендеринг
            updateLineNumbers('htmlCode', 'htmlLines');
            updateLineNumbers('cssCode', 'cssLines');
            updateLineNumbers('jsCode', 'jsLines');
            renderLiveCode();
        });

        function copyCode(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
